<section id="sponsors" class="sponsors">
	<div class="sponsor-section-wrapper sponsor-section-wrapper__partners">
    <h4 class="my-9">Past sponsors</h4>
    <ul class="sponsors-list sponsors-partners mb-9">
      {% for sponsor in site.data.past-sponsors %}
      <li>
        <a href="{{ sponsor.link }}" target="_blank">
          <img src="/images/past-sponsors/{{sponsor.logo}}" />
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</section>
